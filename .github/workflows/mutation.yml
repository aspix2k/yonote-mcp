name: Mutation tests

on:
  push:
    branches: [main]
    paths:
      - "src/api-client.ts"
      - "src/config.ts"
      - "src/tool-policy.ts"
      - "src/tool-registry.ts"
      - "src/__tests__/**"
      - "package*.json"
      - "stryker.config.json"
      - "vitest.config.ts"
  pull_request:
    paths:
      - "src/api-client.ts"
      - "src/config.ts"
      - "src/tool-policy.ts"
      - "src/tool-registry.ts"
      - "src/__tests__/**"
      - "package*.json"
      - "stryker.config.json"
      - "vitest.config.ts"
  schedule:
    - cron: "41 5 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:mutation
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
