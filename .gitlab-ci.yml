stages:
  - test

test:
  stage: test
  image: node:24-alpine
  script:
    - npm ci --ignore-scripts
    - npm run check
    - npm run build
    - npm run package:check
    - npm audit --omit=dev
    - npm pack --dry-run
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
